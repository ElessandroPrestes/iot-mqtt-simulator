server {
    listen 8443 ssl;
    server_name dashboard;
    access_log /var/log/iot-dashboard/access.log;
    error_log /var/log/iot-dashboard/error.log notice;

    ssl_certificate /run/secrets/dashboard_tls_cert;
    ssl_certificate_key /run/secrets/dashboard_tls_key;
    ssl_client_certificate /run/secrets/internal_ca;
    ssl_verify_client on;
    ssl_verify_depth 2;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_conf_command Ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;
    ssl_session_tickets off;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
