# ─── Listener principal ───────────────────────────────────────
listener 1883
protocol mqtt

# ─── WebSocket listener ───────────────────────────────────────
listener 9001
protocol websockets

# ─── Autenticação ─────────────────────────────────────────────
allow_anonymous false
password_file /mosquitto/config/passwd

# ─── Persistência ─────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ─── Logging ──────────────────────────────────────────────────
log_dest stdout
log_type all
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ─── Performance ──────────────────────────────────────────────
max_connections 100
max_inflight_messages 20
max_queued_messages 100
