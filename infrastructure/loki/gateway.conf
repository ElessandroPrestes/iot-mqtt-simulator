pid /tmp/nginx.pid;
error_log /dev/stderr notice;

events {
    worker_connections 512;
}

http {
    access_log /dev/stdout;

    map $ssl_client_s_dn $authorized_log_client {
        default 0;
        ~CN=alloy(?:,|$) 1;
        ~CN=grafana(?:,|$) 1;
    }

    server {
        listen 8443 ssl;
        server_name loki-gateway;

        ssl_certificate /run/secrets/loki_gateway_tls_cert;
        ssl_certificate_key /run/secrets/loki_gateway_tls_key;
        ssl_client_certificate /run/secrets/internal_ca;
        ssl_verify_client on;
        ssl_verify_depth 2;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_conf_command Ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;
        ssl_session_tickets off;

        if ($authorized_log_client = 0) {
            return 403;
        }

        location / {
            limit_except GET POST {
                deny all;
            }

            proxy_pass https://loki:3100;
            proxy_ssl_name loki;
            proxy_ssl_server_name on;
            proxy_ssl_verify on;
            proxy_ssl_verify_depth 2;
            proxy_ssl_trusted_certificate /run/secrets/internal_ca;
            proxy_ssl_certificate /run/secrets/loki_gateway_client_cert;
            proxy_ssl_certificate_key /run/secrets/loki_gateway_client_key;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_ssl_ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256;
        }
    }
}
