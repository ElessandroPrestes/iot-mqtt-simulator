global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "iot_api"
    scheme: "https"
    tls_config:
      ca_file: /run/secrets/internal_ca
      cert_file: /run/secrets/prometheus_client_cert
      key_file: /run/secrets/prometheus_client_key
      server_name: "api"
      insecure_skip_verify: false
    static_configs:
      - targets: ["api:3000"]
