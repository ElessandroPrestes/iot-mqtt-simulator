tls_server_config:
  cert_file: /run/secrets/prometheus_tls_cert
  key_file: /run/secrets/prometheus_tls_key
  client_auth_type: RequireAndVerifyClientCert
  client_ca_file: /run/secrets/internal_ca
  client_allowed_sans:
    - grafana
  min_version: TLS12
  max_version: TLS13
  cipher_suites:
    - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
  prefer_server_cipher_suites: true
