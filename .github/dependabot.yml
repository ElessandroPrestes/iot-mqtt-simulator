version: 2
updates:
  - package-ecosystem: npm
    directory: /services/api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      api-security-updates:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /services/dashboard
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dashboard-security-updates:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /services/simulator
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /services/api
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: /services/dashboard
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: /services/simulator
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
