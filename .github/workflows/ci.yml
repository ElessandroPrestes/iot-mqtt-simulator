name: CI — Integração Contínua

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

# Cancela execuções anteriores do mesmo PR/branch para economizar minutos
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: API (Node.js + Jest + mongodb-memory-server)
  # ──────────────────────────────────────────────
  api:
    name: "API — Testes e Cobertura"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/api/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes com cobertura
        run: npm run test:coverage
        env:
          NODE_ENV: test

      - name: Publicar relatório de cobertura (artefato)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cobertura-api
          path: services/api/coverage/
          retention-days: 7

  # ──────────────────────────────────────────────
  # JOB 2: Simulator (Node.js + Jest ESM)
  # ──────────────────────────────────────────────
  simulator:
    name: "Simulator — Testes"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/simulator

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/simulator/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes
        run: npm test
        env:
          NODE_ENV: test

  # ──────────────────────────────────────────────
  # JOB 3: Dashboard (Vitest + build Vite)
  # ──────────────────────────────────────────────
  dashboard:
    name: "Dashboard — Testes e Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dashboard

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/dashboard/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes
        run: npm test
        env:
          NODE_ENV: test
          VITE_API_URL: http://localhost:3000/api/v1
          VITE_WS_URL: http://localhost:3000

      - name: Verificar build de produção
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: http://localhost:3000/api/v1
          VITE_WS_URL: http://localhost:3000

      - name: Publicar artefato de build
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: services/dashboard/dist/
          retention-days: 7

  # ──────────────────────────────────────────────
  # JOB 4: Status consolidado (gate final)
  # Todos os jobs anteriores precisam passar para este job ser verde.
  # Útil para configurar como "required status check" no GitHub.
  # ──────────────────────────────────────────────
  ci-ok:
    name: "CI — Todos os checks passaram"
    runs-on: ubuntu-latest
    needs: [api, simulator, dashboard]
    if: always()

    steps:
      - name: Verificar resultado geral
        run: |
          if [[ "${{ needs.api.result }}" != "success" || \
                "${{ needs.simulator.result }}" != "success" || \
                "${{ needs.dashboard.result }}" != "success" ]]; then
            echo "❌ Um ou mais jobs falharam."
            exit 1
          fi
          echo "✅ Todos os checks passaram com sucesso."
