name: CI — Qualidade e Segurança

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — Testes, cobertura e dependências
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/api/package-lock.json
      - run: npm ci
      - run: ../../scripts/ci/npm-audit-with-retry.sh
      - run: npm run test:coverage
        env:
          NODE_ENV: test
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cobertura-api
          path: services/api/coverage/
          retention-days: 7

  simulator:
    name: Simulador — Testes e dependências
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/simulator
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/simulator/package-lock.json
      - run: npm ci
      - run: ../../scripts/ci/npm-audit-with-retry.sh
      - run: npm test
        env:
          NODE_ENV: test

  dashboard:
    name: Dashboard — Testes, build e dependências
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dashboard
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/dashboard/package-lock.json
      - run: npm ci
      - run: ../../scripts/ci/npm-audit-with-retry.sh
      - run: npm test
        env:
          NODE_ENV: test
          VITE_API_URL: /api/v1
          VITE_WS_URL: ""
      - run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: /api/v1
          VITE_WS_URL: ""

  codeql:
    name: SAST — CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: github/codeql-action/init@f52b05f4acaaa234e44466e66d29050e135ea9ef # v4.36.0
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/analyze@f52b05f4acaaa234e44466e66d29050e135ea9ef # v4.36.0

  secrets:
    name: Secrets — Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

  images:
    name: Imagem — ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: services/api
            target: production
          - name: dashboard
            context: services/dashboard
            target: production
          - name: simulator
            context: services/simulator
            target: base
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Construir imagem reproduzível
        run: docker build --target "${{ matrix.target }}" --tag "iot-${{ matrix.name }}:ci" "${{ matrix.context }}"
      - name: Bloquear vulnerabilidades corrigíveis altas ou críticas
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          version: v0.70.0
          scan-type: image
          image-ref: iot-${{ matrix.name }}:ci
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Gerar SBOM SPDX
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: iot-${{ matrix.name }}:ci
          format: spdx-json
          artifact-name: sbom-${{ matrix.name }}-${{ github.sha }}.spdx.json

  dast:
    name: DAST — OWASP ZAP baseline
    runs-on: ubuntu-latest
    env:
      SECRETS_DIR: ${{ github.workspace }}/secrets
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/api/package-lock.json
      - run: npm ci --omit=dev
        working-directory: services/api
      - name: Gerar secrets efêmeros do ambiente DAST
        run: ./scripts/ci/prepare-dast-secrets.sh
      - name: Subir perfil de produção
        run: docker compose -f docker-compose.prod.yml up -d --build
        env:
          COMPOSE_PROJECT_NAME: iot-security
          PUBLIC_ORIGIN: https://localhost:8443
      - name: Aguardar health check TLS
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent --insecure https://localhost:8443/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose -f docker-compose.prod.yml ps
          exit 1
        env:
          COMPOSE_PROJECT_NAME: iot-security
          PUBLIC_ORIGIN: https://localhost:8443
      - name: Validar observabilidade protegida por mTLS
        run: |
          curl --fail --silent --insecure https://localhost:8443/ >/dev/null

          loki_gateway_container="$(
            docker compose -f docker-compose.prod.yml ps -q loki-gateway
          )"
          loki_gateway_ip="$(
            docker inspect --format \
              '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' \
              "$loki_gateway_container"
          )"
          test -n "$loki_gateway_ip"
          loki_ready=0
          for attempt in $(seq 1 30); do
            if docker compose -f docker-compose.prod.yml exec -T grafana \
              curl --fail --silent --show-error \
                --resolve "loki-gateway:8443:${loki_gateway_ip}" \
                --cacert /run/secrets/internal_ca \
                --cert /run/secrets/grafana_client_cert \
                --key /run/secrets/grafana_client_key \
                https://loki-gateway:8443/ready >/dev/null; then
              loki_ready=1
              break
            fi
            sleep 2
          done
          if [ "$loki_ready" -ne 1 ]; then
            docker compose -f docker-compose.prod.yml ps
            docker compose -f docker-compose.prod.yml logs --tail=100 \
              loki loki-gateway grafana
            exit 1
          fi

          for attempt in $(seq 1 30); do
            docker compose -f docker-compose.prod.yml exec -T grafana \
              curl --fail --silent --show-error --get \
                --resolve "loki-gateway:8443:${loki_gateway_ip}" \
                --cacert /run/secrets/internal_ca \
                --cert /run/secrets/grafana_client_cert \
                --key /run/secrets/grafana_client_key \
                --data-urlencode 'match[]={service_name=~".+"}' \
                https://loki-gateway:8443/loki/api/v1/series \
                > /tmp/loki-series.json
            if jq -e \
              '(["api", "simulator", "edge", "dashboard", "broker", "mongo"] -
                [.data[].service_name]) | length == 0' \
              /tmp/loki-series.json >/dev/null; then
              break
            fi
            sleep 2
          done
          jq -e \
            '(["api", "simulator", "edge", "dashboard", "broker", "mongo"] -
              [.data[].service_name]) | length == 0' \
            /tmp/loki-series.json >/dev/null

          if docker compose -f docker-compose.prod.yml exec -T grafana \
            curl --fail --silent --show-error \
              --resolve "loki-gateway:8443:${loki_gateway_ip}" \
              --cacert /run/secrets/internal_ca \
              https://loki-gateway:8443/ready >/dev/null; then
            echo "Gateway Loki aceitou cliente sem certificado"
            exit 1
          fi

          datasource_uid="$(
            docker compose -f docker-compose.prod.yml exec -T grafana sh -c \
              'read -r password < /run/secrets/grafana_admin_password;
               exec curl --fail --silent --show-error --user "admin:${password}" \
                 http://127.0.0.1:3000/api/datasources/name/Loki' \
              | jq -r '.uid'
          )"
          test -n "$datasource_uid"
          docker compose -f docker-compose.prod.yml exec -T grafana sh -c \
            'read -r password < /run/secrets/grafana_admin_password;
             exec curl --fail --silent --show-error --user "admin:${password}" \
               "http://127.0.0.1:3000/api/datasources/uid/$1/health"' \
            sh "$datasource_uid" \
            | jq -e '.status == "OK"' >/dev/null
        env:
          COMPOSE_PROJECT_NAME: iot-security
          PUBLIC_ORIGIN: https://localhost:8443
      - name: Executar baseline e gerar relatórios
        run: |
          mkdir -p dast
          chmod 0777 dast
          docker run --rm \
            --network iot-security_frontend \
            --volume "$PWD/dast:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable@sha256:c558ee87358911ab17278c70991e856f57793e115d9cd0f88ca475cf82907a1a \
            zap-baseline.py \
            -t https://nginx \
            -I \
            -J zap.json \
            -r zap.html \
            -z "-config connection.sslAcceptAll=true"
          high_count=$(jq '[.site[]?.alerts[]? | select((.riskcode | tonumber) >= 3)] | length' dast/zap.json)
          test "$high_count" -eq 0
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dast-zap
          path: dast/
          retention-days: 14
      - if: always()
        name: Encerrar ambiente DAST
        run: |
          docker compose -f docker-compose.prod.yml down --volumes
          if [ -d "$SECRETS_DIR" ]; then
            find "$SECRETS_DIR" -type f -delete
            rmdir "$SECRETS_DIR"
          fi
        env:
          COMPOSE_PROJECT_NAME: iot-security
          PUBLIC_ORIGIN: https://localhost:8443

  ci-ok:
    name: CI — Todos os gates passaram
    runs-on: ubuntu-latest
    if: always()
    needs: [api, simulator, dashboard, codeql, secrets, images, dast]
    steps:
      - name: Consolidar resultado
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          if [[ "$RESULTS" == *failure* || "$RESULTS" == *cancelled* ]]; then
            echo "Um ou mais gates falharam: $RESULTS"
            exit 1
          fi
          echo "Todos os gates obrigatórios passaram: $RESULTS"
