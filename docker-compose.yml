services:
  # ─────────────────────────────────────────
  # MQTT BROKER — Eclipse Mosquitto
  # ─────────────────────────────────────────
  broker:
    image: eclipse-mosquitto:2.0
    container_name: iot_broker
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "${MQTT_WS_HOST_PORT:-9002}:9001" # WebSocket MQTT (host configurável)
    volumes:
      - ./services/broker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./services/broker/passwd:/mosquitto/config/passwd:ro
      - broker_data:/mosquitto/data
      - broker_log:/mosquitto/log
    env_file: .env
    networks:
      - iot_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mosquitto_pub -u "$$MQTT_USERNAME" -P "$$MQTT_PASSWORD" -t "healthcheck" -m "ping" -i healthcheck',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # MONGODB
  # ─────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: iot_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: iot_dashboard
    networks:
      - iot_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # API — Node.js + Express
  # ─────────────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      target: development
    container_name: iot_api
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "9090:9090"      # Métricas Prometheus
    env_file: .env
    volumes:
      - ./services/api/src:/app/src:ro
    depends_on:
      broker:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - iot_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # SIMULATOR — Publica dados falsos via MQTT
  # ─────────────────────────────────────────
  simulator:
    build:
      context: ./services/simulator
      dockerfile: Dockerfile
    container_name: iot_simulator
    restart: unless-stopped
    env_file: .env
    depends_on:
      broker:
        condition: service_healthy
    networks:
      - iot_network

  # ─────────────────────────────────────────
  # DASHBOARD — Vue.js (Vite dev server)
  # ─────────────────────────────────────────
  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
      target: development
    container_name: iot_dashboard
    restart: unless-stopped
    ports:
      - "5173:5173"
    env_file: .env
    volumes:
      - ./services/dashboard/src:/app/src:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - iot_network

  # ─────────────────────────────────────────
  # PROMETHEUS — Time-series DB
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: iot_prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - iot_network
    depends_on:
      - api

  # ─────────────────────────────────────────
  # GRAFANA — Observability Dashboard
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: iot_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?defina GF_SECURITY_ADMIN_PASSWORD no .env}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - iot_network
    depends_on:
      - prometheus

volumes:
  broker_data:
  broker_log:
  mongo_data:
  prometheus_data:
  grafana_data:

networks:
  iot_network:
    driver: bridge
