version: '3.9'

services:
  broker:
    image: eclipse-mosquitto:2.0
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ./services/broker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./services/broker/passwd:/mosquitto/config/passwd:ro
      - broker_data:/mosquitto/data
    networks:
      - iot_network

  mongo:
    image: mongo:7.0
    restart: always
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: iot_dashboard
    networks:
      - iot_network

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      target: production
    restart: always
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - broker
      - mongo
    networks:
      - iot_network

  simulator:
    build:
      context: ./services/simulator
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    depends_on:
      - broker
    networks:
      - iot_network

  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
      target: production
    restart: always
    ports:
      - "80:80"
    networks:
      - iot_network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - dashboard
    networks:
      - iot_network

volumes:
  broker_data:
  mongo_data:

networks:
  iot_network:
    driver: bridge
