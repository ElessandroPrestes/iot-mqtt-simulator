services:
  broker:
    image: eclipse-mosquitto:2.0
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ./services/broker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./services/broker/passwd:/mosquitto/config/passwd:ro
      - broker_data:/mosquitto/data
    networks:
      - iot_network

  mongo:
    image: mongo:7.0
    restart: always
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: iot_dashboard
    networks:
      - iot_network

  api:
    image: iot-mqtt-simulator-api:prod
    build:
      context: ./services/api
      dockerfile: Dockerfile
      target: production
    restart: always
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - broker
      - mongo
    networks:
      - iot_network

  simulator:
    image: iot-mqtt-simulator-simulator:prod
    build:
      context: ./services/simulator
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    depends_on:
      - broker
    networks:
      - iot_network

  dashboard:
    image: iot-mqtt-simulator-dashboard:prod
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
      target: production
    restart: always
    networks:
      - iot_network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "${NGINX_PORT:-8080}:80"
      - "${NGINX_SSL_PORT:-8443}:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - dashboard
    networks:
      - iot_network

  prometheus:
    image: prom/prometheus:v2.53.1
    restart: always
    ports:
      - "9091:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - iot_network
    depends_on:
      - api

  grafana:
    image: grafana/grafana-oss:11.1.0
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - iot_network
    depends_on:
      - prometheus

volumes:
  broker_data:
  mongo_data:
  prometheus_data:
  grafana_data:

networks:
  iot_network:
    driver: bridge
