services:
  broker:
    image: eclipse-mosquitto:2.0@sha256:212f89e1eaeb2c322d6441b64396e3346026674db8fa9c27beac293405c32b3c
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ./services/broker/mosquitto.prod.conf:/mosquitto/config/mosquitto.conf:ro
      - ./services/broker/acl:/mosquitto/config/acl:ro
      - broker_data:/mosquitto/data
    secrets:
      - internal_ca
      - broker_tls_cert
      - broker_tls_key
      - health_client_cert
      - health_client_key
    tmpfs:
      - /tmp
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mosquitto_pub -h 127.0.0.1 -p 8883 --cafile /run/secrets/internal_ca --cert /run/secrets/health_client_cert --key /run/secrets/health_client_key -t healthcheck -m ping -i healthcheck",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7.0@sha256:9bdaeb6dac6e7e762e84e2f84103d1f9bb078fa1ba6bde8bb9d2274f655ad173
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - mongo_data:/data/db
      - ./infrastructure/mongodb/10-create-x509-user.js:/docker-entrypoint-initdb.d/10-create-x509-user.js:ro
    environment:
      MONGO_INITDB_DATABASE: iot_dashboard
      MONGO_INITDB_ROOT_USERNAME_FILE: /run/secrets/mongodb_root_username
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongodb_root_password
    secrets:
      - mongodb_root_username
      - mongodb_root_password
      - internal_ca
      - mongo_tls_pem
      - health_client_pem
    command:
      - mongod
      - --bind_ip_all
      - --tlsMode
      - requireTLS
      - --tlsCAFile
      - /run/secrets/internal_ca
      - --tlsCertificateKeyFile
      - /run/secrets/mongo_tls_pem
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --host 127.0.0.1 --tls --tlsCAFile /run/secrets/internal_ca --tlsCertificateKeyFile /run/secrets/health_client_pem -u \"$$(cat /run/secrets/mongodb_root_username)\" -p \"$$(cat /run/secrets/mongodb_root_password)\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: iot-mqtt-simulator-api:prod
    build:
      context: ./services/api
      dockerfile: Dockerfile
      target: production
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      NODE_ENV: production
      API_PORT: 3000
      MONGODB_URI: mongodb://CN%3Dapi-processor@mongo:27017/iot_dashboard?authSource=%24external&authMechanism=MONGODB-X509&tls=true
      MONGODB_DB_NAME: iot_dashboard
      MQTT_BROKER_HOST: broker
      MQTT_BROKER_PORT: 8883
      MQTT_CLIENT_ID_API: api-processor
      INTERNAL_CA_FILE: /run/secrets/internal_ca
      API_CLIENT_CERT_FILE: /run/secrets/api_client_cert
      API_CLIENT_KEY_FILE: /run/secrets/api_client_key
      API_TLS_CERT_FILE: /run/secrets/api_tls_cert
      API_TLS_KEY_FILE: /run/secrets/api_tls_key
      HEALTHCHECK_HOST: api
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      AUTH_PRINCIPALS_FILE: /run/secrets/auth_principals
      JWT_ISSUER: iot-mqtt-simulator-api
      JWT_AUDIENCE: iot-mqtt-simulator-dashboard
      ACCESS_TOKEN_TTL_SECONDS: 900
      REFRESH_TOKEN_TTL_SECONDS: 28800
      SESSION_IDLE_TTL_SECONDS: 1800
      MAX_CONCURRENT_SESSIONS: 3
      MFA_REQUIRED: "true"
      LOGIN_RATE_WINDOW_MS: 900000
      LOGIN_RATE_MAX: 5
      CORS_ORIGINS: ${PUBLIC_ORIGIN:?PUBLIC_ORIGIN deve ser definido}
      SWAGGER_ENABLED: "false"
      LOG_LEVEL: info
      TEMP_WARN_THRESHOLD: ${TEMP_WARN_THRESHOLD:-70}
      TEMP_CRITICAL_THRESHOLD: ${TEMP_CRITICAL_THRESHOLD:-90}
      PRESSURE_WARN_THRESHOLD: ${PRESSURE_WARN_THRESHOLD:-8.5}
      PRESSURE_CRITICAL_THRESHOLD: ${PRESSURE_CRITICAL_THRESHOLD:-10}
      HUMIDITY_WARN_THRESHOLD: ${HUMIDITY_WARN_THRESHOLD:-80}
      HUMIDITY_CRITICAL_THRESHOLD: ${HUMIDITY_CRITICAL_THRESHOLD:-90}
      VIBRATION_WARN_THRESHOLD: ${VIBRATION_WARN_THRESHOLD:-4.5}
      VIBRATION_CRITICAL_THRESHOLD: ${VIBRATION_CRITICAL_THRESHOLD:-6}
    secrets:
      - internal_ca
      - api_client_cert
      - api_client_key
      - api_tls_cert
      - api_tls_key
      - jwt_secret
      - auth_principals
    tmpfs:
      - /tmp
    depends_on:
      broker:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "node", "src/utils/healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 5

  simulator:
    image: iot-mqtt-simulator-simulator:prod
    build:
      context: ./services/simulator
      dockerfile: Dockerfile
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      NODE_ENV: production
      MQTT_BROKER_HOST: broker
      MQTT_BROKER_PORT: 8883
      MQTT_CLIENT_ID_SIM: simulator
      INTERNAL_CA_FILE: /run/secrets/internal_ca
      SIMULATOR_CLIENT_CERT_FILE: /run/secrets/simulator_client_cert
      SIMULATOR_CLIENT_KEY_FILE: /run/secrets/simulator_client_key
      SIMULATOR_INTERVAL_MS: ${SIMULATOR_INTERVAL_MS:-2000}
      SIMULATOR_SENSORS_COUNT: ${SIMULATOR_SENSORS_COUNT:-8}
      SIMULATOR_ANOMALY_PROBABILITY: ${SIMULATOR_ANOMALY_PROBABILITY:-0.05}
    secrets:
      - internal_ca
      - simulator_client_cert
      - simulator_client_key
    tmpfs:
      - /tmp
    depends_on:
      broker:
        condition: service_healthy
    networks:
      - backend

  dashboard:
    image: iot-mqtt-simulator-dashboard:prod
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: /api/v1
        VITE_WS_URL: ""
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    secrets:
      - internal_ca
      - dashboard_tls_cert
      - dashboard_tls_key
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine@sha256:4a73073bd557c65b759505da037898b61f1be6cbcc3c2c3aeac22d2a470c1752
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    environment:
      NGINX_HTTPS_PORT: ${NGINX_HTTPS_PORT:-8443}
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/templates/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    secrets:
      - tls_certificate
      - tls_private_key
      - internal_ca
      - nginx_client_cert
      - nginx_client_key
    tmpfs:
      - /var/cache/nginx
      - /etc/nginx/conf.d
      - /var/run
      - /tmp
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.53.1@sha256:f20d3127bf2876f4a1df76246fca576b41ddf1125ed1c546fbd8b16ea55117e6
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    secrets:
      - internal_ca
      - prometheus_client_cert
      - prometheus_client_key
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    tmpfs:
      - /tmp
    networks:
      - backend
      - observability
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana-oss:11.1.0@sha256:079600c9517b678c10cda6006b4487d3174512fd4c6cface37df7822756ed7a5
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    secrets:
      - grafana_admin_password
    networks:
      - observability
    depends_on:
      - prometheus

secrets:
  auth_principals:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/auth_principals.json
  grafana_admin_password:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/grafana_admin_password
  jwt_secret:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/jwt_secret
  internal_ca:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/internal_ca.crt
  api_client_cert:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/api_client.crt
  api_client_key:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/api_client.key
  api_tls_cert:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/api_tls.crt
  api_tls_key:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/api_tls.key
  broker_tls_cert:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/broker_tls.crt
  broker_tls_key:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/broker_tls.key
  dashboard_tls_cert:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/dashboard_tls.crt
  dashboard_tls_key:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/dashboard_tls.key
  health_client_cert:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/health_client.crt
  health_client_key:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/health_client.key
  health_client_pem:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/health_client.pem
  mongo_tls_pem:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/mongo_tls.pem
  nginx_client_cert:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/nginx_client.crt
  nginx_client_key:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/nginx_client.key
  prometheus_client_cert:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/prometheus_client.crt
  prometheus_client_key:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/prometheus_client.key
  simulator_client_cert:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/simulator_client.crt
  simulator_client_key:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/simulator_client.key
  mongodb_root_password:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/mongodb_root_password
  mongodb_root_username:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/mongodb_root_username
  tls_certificate:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/tls_certificate.crt
  tls_private_key:
    file: ${SECRETS_DIR:?SECRETS_DIR_required}/tls_private_key.key

volumes:
  broker_data:
  grafana_data:
  mongo_data:
  prometheus_data:

networks:
  backend:
    driver: bridge
    internal: true
  frontend:
    driver: bridge
  observability:
    driver: bridge
    internal: true
